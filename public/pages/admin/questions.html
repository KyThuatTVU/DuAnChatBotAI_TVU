<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý câu hỏi - CELRAS TVU Admin</title>
    <!-- Tailwind CDN: viết class trực tiếp vào HTML -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Inter',ui-sans-serif,system-ui,sans-serif}
        .admin-layout{min-height:100vh}
        .admin-sidebar{width:240px;background:#1e293b;color:#fff;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:40;display:flex;flex-direction:column}
        .admin-content{margin-left:240px;padding:32px;min-height:100vh}
        .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
        .admin-header h1{font-size:22px;font-weight:700;color:#111827}
        .sidebar-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
        .sidebar-logo span{font-weight:700;font-size:15px;color:#fff}
        .nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;color:#94a3b8;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none}
        .nav-item:hover{background:rgba(255,255,255,.08);color:#f1f5f9}
        .nav-item.active{background:rgba(14,165,233,.2);color:#38bdf8;border-right:3px solid #38bdf8}
        .nav-item svg{width:18px;height:18px;flex-shrink:0}
        .nav-section{padding:16px 20px 6px;font-size:11px;font-weight:600;text-transform:uppercase;color:#475569;letter-spacing:.08em}
        .sidebar-logout{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
        .btn-primary{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:#0369a1;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:background .15s}
        .btn-primary:hover{background:#0284c7}
        .btn-outline{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
        .btn-outline:hover{background:#f9fafb}
        .btn-danger{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#fee2e2;color:#dc2626;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none}
        .btn-danger:hover{background:#fecaca}
        .data-table{width:100%;border-collapse:collapse;font-size:14px}
        .data-table thead th{background:#f8fafc;padding:11px 14px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;color:#64748b;border-bottom:1px solid #e2e8f0}
        .data-table tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s}
        .data-table tbody tr:hover{background:#f8fafc}
        .data-table tbody td{padding:12px 14px;color:#374151;vertical-align:top}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:16px}
        .modal-overlay.active{display:flex}
        .modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
        .form-group input,.form-group select,.form-group textarea{display:block;width:100%;padding:9px 13px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;color:#111827;background:#fff;outline:none;transition:border .15s;font-family:inherit}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.12)}
        .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:9999px;font-size:12px;font-weight:600}
        .badge-green,.badge-success{background:#dcfce7;color:#15803d}
        .badge-yellow,.badge-warning{background:#fef9c3;color:#a16207}
        .badge-red,.badge-danger{background:#fee2e2;color:#dc2626}
        .badge-blue,.badge-info{background:#dbeafe;color:#1d4ed8}
        @media(max-width:768px){.admin-content{margin-left:0;padding:16px}.admin-sidebar{transform:translateX(-100%)}}
    </style>
</head>
<body class="bg-gray-50">

    <div class="admin-layout">
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-logo">
                <a href="/DuAnChatbotThuVien/public/pages/chatbot.html" class="flex items-center gap-2" style="text-decoration:none">
                    <img src="/DuAnChatbotThuVien/public/assets/images/logo.png" alt="Logo" class="w-8 h-8 rounded-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=CELRAS&background=0369a1&color=fff&rounded=true&size=36'">
                    <span>CELRAS TVU</span>
                </a>
            </div>
            <nav class="flex flex-col mt-1 flex-1">
                <a href="dashboard.html" class="nav-item" data-page="dashboard"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>Dashboard</a>
                <a href="questions.html" class="nav-item active" data-page="questions"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Quản lý câu hỏi</a>
                <a href="categories.html" class="nav-item" data-page="categories"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>Danh mục</a>
                <a href="datasets.html" class="nav-item" data-page="datasets"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>Tải dữ liệu</a>
                <a href="settings.html" class="nav-item" data-page="settings"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Cài đặt giao diện</a>
                <a href="unanswered.html" class="nav-item" data-page="unanswered"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>Chưa trả lời</a>
            </nav>
            <div class="sidebar-logout flex flex-col gap-1">
                <a href="/DuAnChatbotThuVien/public/pages/chatbot.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>Về trang chatbot</a>
                <a href="#" onclick="logout();return false" class="nav-item" style="color:#f87171"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Đăng xuất</a>
            </div>
        </aside>

        <div class="admin-content">
            <!-- Header -->
            <div class="admin-header">
                <div>
                    <h1>Quản lý câu hỏi</h1>
                    <p class="text-sm text-gray-500 mt-1">Thêm, sửa, xóa bộ câu hỏi cho chatbot</p>
                </div>
                <button class="btn-primary" onclick="openAddModal()">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    Thêm câu hỏi
                </button>
            </div>

            <!-- Search & Filter -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6">
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1">
                        <input type="text" id="searchInput" placeholder="Tìm kiếm câu hỏi..." class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-sky-500" onkeyup="filterQuestions()">
                    </div>
                    <select id="filterCategory" class="px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-sky-500" onchange="filterQuestions()">
                        <option value="">Tất cả danh mục</option>
                    </select>
                    <select id="filterSource" class="px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-sky-500" onchange="filterQuestions()">
                        <option value="">Tất cả nguồn</option>
                        <option value="manual">Nhập tay</option>
                        <option value="word">Word</option>
                        <option value="pdf">PDF</option>
                    </select>
                </div>
            </div>

            <!-- Questions Table -->
            <div class="overflow-x-auto">
                <table class="data-table" id="questionsTable">
                    <thead>
                        <tr>
                            <th class="w-12">#</th>
                            <th>Câu hỏi</th>
                            <th>Danh mục</th>
                            <th>Nguồn</th>
                            <th>Trạng thái</th>
                            <th class="w-32">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="questionsBody">
                        <tr><td colspan="6" class="text-center py-8 text-gray-400">Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal: Add/Edit Question -->
    <div class="modal-overlay" id="questionModal">
        <div class="modal">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold" id="modalTitle">Thêm câu hỏi mới</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <form id="questionForm" onsubmit="saveQuestion(event)">
                <input type="hidden" id="questionId">
                <div class="form-group">
                    <label>Danh mục</label>
                    <select id="questionCategory">
                        <option value="">-- Chọn danh mục --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Câu hỏi <span class="text-red-500">*</span></label>
                    <textarea id="questionText" rows="3" placeholder="Nhập câu hỏi..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Câu trả lời <span class="text-red-500">*</span></label>
                    <textarea id="answerText" rows="5" placeholder="Nhập câu trả lời..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Từ khóa <span class="text-gray-400 text-xs">(phân cách bằng dấu phẩy)</span></label>
                    <input type="text" id="keywordsInput" placeholder="VD: mượn sách, thẻ thư viện, giờ mở cửa">
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="closeModal()" class="btn-outline">Hủy</button>
                    <button type="submit" class="btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                        Lưu
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/DuAnChatbotThuVien/public/assets/js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await loadAdminPage('questions');
            loadQuestions();
            loadCategoriesForSelect();
        });
    </script>
</body>
</html>
